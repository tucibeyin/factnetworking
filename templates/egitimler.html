<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <title>Eğitmenler ve Eğitimler | Fact Network</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-black: #000000;
            --light-gray: #F2F2F2;
            --border-gray: #CCCCCC;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            background: #fff;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* Filtreleme Çubuğu [cite: 66, 67] */
        .filter-bar {
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
            padding: 20px;
            background: var(--light-gray);
        }

        .filter-bar select {
            padding: 10px;
            border: 1px solid var(--border-gray);
            font-family: inherit;
        }

        /* Eğitmen Kartları [cite: 70] */
        .instructor-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 30px;
        }

        .instructor-card {
            border: 1px solid var(--border-gray);
            padding: 24px;
            transition: 0.3s;
        }

        .instructor-card:hover {
            border-color: var(--primary-black);
        }

        .instructor-img {
            width: 100%;
            height: 250px;
            background: #eee;
            object-fit: cover;
            margin-bottom: 20px;
        }

        .level-badge {
            display: inline-block;
            padding: 4px 8px;
            background: #000;
            color: #fff;
            font-size: 12px;
            margin-bottom: 10px;
        }

        /* Eğitim Listesi [cite: 76] */
        .course-list {
            margin-top: 20px;
            border-top: 1px solid var(--border-gray);
            padding-top: 20px;
        }

        .course-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            font-size: 14px;
        }

        .buy-btn {
            text-decoration: none;
            color: #fff;
            background: #000;
            padding: 6px 12px;
            font-size: 12px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Eğitmenler ve Eğitimler</h1>

        <div class="filter-bar">
            <form action="/egitimler" method="get" style="display:flex; gap:20px;">
                <select name="category" onchange="this.form.submit()">
                    <option value="">Tüm Alanlar</option>
                    <option value="Emlak">Emlak</option>
                    <option value="Hukuk">Hukuk</option>
                </select>
                <span>Filtrele: Uzmanlık Kademesi, İçerik Türü</span>
            </form>
        </div>

        <div class="instructor-grid">
            {% for i in instructors %}
            <div class="instructor-card">
                <img src="{{ i.image }}" class="instructor-img">
                <span class="level-badge">{{ i.level }} - {{ i.title }}</span>
                <h3>{{ i.name }}</h3>
                <p>{{ i.intro }}</p>

                <div class="course-list">
                    <h4>Aktif Eğitimler ({{ i.courses|length }})</h4>
                    {% for c in i.courses %}
                    <div class="course-item">
                        <span>{{ c.title }} <br> <small>{{ c.type }} | {{ c.price }}</small></span>
                        <a href="{{ c.link }}" class="buy-btn" target="_blank">Satın Al</a>
                    </div>
                    {% endfor %}
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</body>

</html>
